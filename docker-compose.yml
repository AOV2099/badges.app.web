services:
  db:
    image: postgres:16
    container_name: badges-db
    environment:
      POSTGRES_DB: ${DB_NAME:-open_badges}
      POSTGRES_USER: ${DB_USER:-badges}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-badges}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./back-end
    container_name: badges-backend
    environment:
      PORT: 3001
      BASE_URL: ${BACKEND_PUBLIC_URL:-http://localhost:3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      BADGE_VALIDITY_DAYS: ${BADGE_VALIDITY_DAYS:-365}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-open_badges}
      DB_USER: ${DB_USER:-badges}
      DB_PASSWORD: ${DB_PASSWORD:-badges}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-}
      BADGE_PRIVATE_KEY_PATH: /app/data/signing-private-key.pem
    volumes:
      - badges_data:/app/data
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./front-end
    container_name: badges-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  badges_data:
  postgres_data:
